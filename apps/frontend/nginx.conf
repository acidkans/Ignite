server {
    listen 80;
    server_name localhost;

    # sw.js i index.html muszą być zawsze pobierane świeżo — bez tego przeglądarka
    # cachuje stary SW i nigdy nie wykrywa aktualizacji.
    location ~* ^/(sw\.js|index\.html|workbox-.+\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Hashed assets (JS/CSS/fonts z fingerprint w nazwie) — długi cache OK.
    location ~* \.(js|css|woff2|woff|ttf|png|ico|svg|webp)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://erp-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
